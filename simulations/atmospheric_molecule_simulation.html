<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #controls { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        label { font-size: 14px; color: var(--color-text-secondary, #666); }
        input[type="range"] { flex: 1; min-width: 120px; }
        button { 
            padding: 8px 16px; 
            background: var(--color-background-primary, white); 
            border: 0.5px solid var(--color-border-secondary, #ccc); 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px;
        }
        button:hover { background: var(--color-background-secondary, #f5f5f5); }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .stat-card { 
            background: var(--color-background-secondary, #f8f9fa); 
            padding: 12px; 
            border-radius: 6px; 
            text-align: center; 
        }
        .stat-value { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: var(--color-text-secondary, #666); }
        #canvas { 
            border: 1px solid var(--color-border-tertiary, #e0e0e0); 
            border-radius: 8px; 
            background: linear-gradient(to bottom, #e3f2fd 0%, #f1f8e9 100%);
            cursor: crosshair;
        }
        .legend { 
            display: flex; 
            gap: 20px; 
            margin-top: 12px; 
            font-size: 13px; 
            flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="controls">
        <label>Temperature</label>
        <input type="range" id="tempSlider" min="0" max="100" value="50">
        <span id="tempValue">25°C</span>
        
        <label>Air Density</label>
        <input type="range" id="densitySlider" min="1" max="10" value="5">
        <span id="densityValue">50%</span>
        
        <button onclick="resetSimulation()">Reset</button>
        <button onclick="togglePause()" id="pauseBtn">Pause</button>
        <button onclick="addTrackedAtom()">Track Atom ↗</button>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="totalMolecules">0</div>
            <div class="stat-label">Total molecules</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="clustersFound">0</div>
            <div class="stat-label">Clusters detected</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="patternsFound">0</div>
            <div class="stat-label">Patterns identified</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avgSpeed">0.0</div>
            <div class="stat-label">Avg speed (px/frame)</div>
        </div>
    </div>
    
    <canvas id="canvas" width="800" height="500"></canvas>
    
    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #2196F3;"></div>
            <span>O₂ molecules</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #4CAF50;"></div>
            <span>N₂ molecules</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #FF9800;"></div>
            <span>CO₂ molecules</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #E91E63;"></div>
            <span>H₂O molecules</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #9C27B0;"></div>
            <span>Tracked atom</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: rgba(255,255,255,0.3); border: 1px solid #666;"></div>
            <span>Detected clusters</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let molecules = [];
        let clusters = [];
        let patterns = [];
        let trackedAtoms = [];
        let animationId;
        let isPaused = false;
        
        const moleculeTypes = [
            { type: 'O2', color: '#2196F3', mass: 32, abundance: 0.21 },
            { type: 'N2', color: '#4CAF50', mass: 28, abundance: 0.78 },
            { type: 'CO2', color: '#FF9800', mass: 44, abundance: 0.0004 },
            { type: 'H2O', color: '#E91E63', mass: 18, abundance: 0.01 }
        ];
        
        class Molecule {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.type = type;
                this.radius = Math.sqrt(type.mass) / 3;
                this.clusterId = null;
                this.age = 0;
            }
            
            update(temperature, density) {
                this.age++;
                const tempFactor = temperature / 50;
                const brownianForce = 0.1 * tempFactor;
                
                // Brownian motion
                this.vx += (Math.random() - 0.5) * brownianForce;
                this.vy += (Math.random() - 0.5) * brownianForce;
                
                // Damping
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // Update position
                this.x += this.vx * tempFactor;
                this.y += this.vy * tempFactor;
                
                // Boundary conditions
                if (this.x < 0 || this.x > canvas.width) this.vx *= -0.8;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -0.8;
                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
            }
            
            draw(ctx) {
                ctx.fillStyle = this.type.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.clusterId !== null) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
        
        class TrackedAtom {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.trail = [{x, y}];
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.radius = 4;
                this.age = 0;
            }
            
            update(temperature) {
                this.age++;
                const tempFactor = temperature / 50;
                const brownianForce = 0.15 * tempFactor;
                
                // Enhanced Brownian motion for tracked atom
                this.vx += (Math.random() - 0.5) * brownianForce;
                this.vy += (Math.random() - 0.5) * brownianForce;
                
                // Interact with nearby molecules
                molecules.forEach(mol => {
                    const dx = mol.x - this.x;
                    const dy = mol.y - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < 20) {
                        const force = 0.02 * tempFactor / (dist + 1);
                        this.vx += dx * force;
                        this.vy += dy * force;
                    }
                });
                
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                this.x += this.vx * tempFactor;
                this.y += this.vy * tempFactor;
                
                // Boundary conditions
                if (this.x < 0 || this.x > canvas.width) this.vx *= -0.7;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -0.7;
                this.x = Math.max(0, Math.min(canvas.width, this.x));
                this.y = Math.max(0, Math.min(canvas.height, this.y));
                
                // Update trail
                this.trail.push({x: this.x, y: this.y});
                if (this.trail.length > 100) {
                    this.trail.shift();
                }
            }
            
            draw(ctx) {
                // Draw trail
                if (this.trail.length > 1) {
                    ctx.strokeStyle = 'rgba(156, 39, 176, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    this.trail.forEach(point => ctx.lineTo(point.x, point.y));
                    ctx.stroke();
                }
                
                // Draw atom
                ctx.fillStyle = '#9C27B0';
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // Draw age indicator
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '10px sans-serif';
                ctx.fillText(`${Math.floor(this.age/60)}s`, this.x + 6, this.y - 6);
            }
        }
        
        function initializeMolecules(density) {
            molecules = [];
            const numMolecules = Math.floor(density * 80);
            
            for (let i = 0; i < numMolecules; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                
                // Select molecule type based on abundance
                let rand = Math.random();
                let selectedType = moleculeTypes[0];
                
                for (const type of moleculeTypes) {
                    if (rand < type.abundance) {
                        selectedType = type;
                        break;
                    }
                    rand -= type.abundance;
                }
                
                molecules.push(new Molecule(x, y, selectedType));
            }
        }
        
        function detectClusters() {
            clusters = [];
            const visited = new Set();
            const clusterThreshold = 25;
            
            molecules.forEach((mol, i) => {
                if (visited.has(i)) return;
                
                const cluster = [];
                const stack = [i];
                
                while (stack.length > 0) {
                    const currentIdx = stack.pop();
                    if (visited.has(currentIdx)) continue;
                    
                    visited.add(currentIdx);
                    const currentMol = molecules[currentIdx];
                    cluster.push(currentMol);
                    
                    molecules.forEach((otherMol, j) => {
                        if (visited.has(j)) return;
                        
                        const dx = currentMol.x - otherMol.x;
                        const dy = currentMol.y - otherMol.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < clusterThreshold) {
                            stack.push(j);
                        }
                    });
                }
                
                if (cluster.length >= 3) {
                    clusters.push(cluster);
                    cluster.forEach((mol, idx) => mol.clusterId = clusters.length - 1);
                }
            });
        }
        
        function detectPatterns() {
            patterns = [];
            
            // Pattern 1: Linear arrangements
            clusters.forEach(cluster => {
                if (cluster.length >= 4) {
                    let linearScore = 0;
                    for (let i = 2; i < cluster.length; i++) {
                        const p1 = cluster[i-2];
                        const p2 = cluster[i-1];
                        const p3 = cluster[i];
                        
                        const angle1 = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                        const angle2 = Math.atan2(p3.y - p2.y, p3.x - p2.x);
                        const angleDiff = Math.abs(angle1 - angle2);
                        
                        if (angleDiff < 0.3) linearScore++;
                    }
                    
                    if (linearScore >= cluster.length / 2) {
                        patterns.push({type: 'linear', cluster, score: linearScore});
                    }
                }
            });
            
            // Pattern 2: Circular arrangements
            clusters.forEach(cluster => {
                if (cluster.length >= 5) {
                    const centerX = cluster.reduce((sum, mol) => sum + mol.x, 0) / cluster.length;
                    const centerY = cluster.reduce((sum, mol) => sum + mol.y, 0) / cluster.length;
                    
                    const avgRadius = cluster.reduce((sum, mol) => {
                        const dx = mol.x - centerX;
                        const dy = mol.y - centerY;
                        return sum + Math.sqrt(dx*dx + dy*dy);
                    }, 0) / cluster.length;
                    
                    let circularScore = 0;
                    cluster.forEach(mol => {
                        const dx = mol.x - centerX;
                        const dy = mol.y - centerY;
                        const radius = Math.sqrt(dx*dx + dy*dy);
                        if (Math.abs(radius - avgRadius) < avgRadius * 0.3) {
                            circularScore++;
                        }
                    });
                    
                    if (circularScore >= cluster.length * 0.7) {
                        patterns.push({type: 'circular', cluster, score: circularScore, center: {x: centerX, y: centerY}, radius: avgRadius});
                    }
                }
            });
        }
        
        function drawClusters() {
            clusters.forEach((cluster, idx) => {
                if (cluster.length < 3) return;
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                
                // Draw convex hull around cluster
                const hull = getConvexHull(cluster.map(mol => ({x: mol.x, y: mol.y})));
                if (hull.length > 0) {
                    ctx.moveTo(hull[0].x, hull[0].y);
                    hull.forEach(point => ctx.lineTo(point.x, point.y));
                    ctx.closePath();
                    ctx.stroke();
                }
                ctx.setLineDash([]);
            });
        }
        
        function drawPatterns() {
            patterns.forEach(pattern => {
                if (pattern.type === 'circular') {
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(pattern.center.x, pattern.center.y, pattern.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.8)';
                    ctx.font = '12px sans-serif';
                    ctx.fillText('Circular', pattern.center.x - 20, pattern.center.y - pattern.radius - 10);
                } else if (pattern.type === 'linear') {
                    ctx.strokeStyle = 'rgba(255, 20, 147, 0.6)';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([10, 5]);
                    ctx.beginPath();
                    
                    const sortedCluster = pattern.cluster.sort((a, b) => a.x - b.x);
                    ctx.moveTo(sortedCluster[0].x, sortedCluster[0].y);
                    sortedCluster.forEach(mol => ctx.lineTo(mol.x, mol.y));
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = 'rgba(255, 20, 147, 0.8)';
                    ctx.font = '12px sans-serif';
                    ctx.fillText('Linear', sortedCluster[0].x, sortedCluster[0].y - 10);
                }
            });
        }
        
        function getConvexHull(points) {
            if (points.length < 3) return points;
            
            points.sort((a, b) => a.x - b.x || a.y - b.y);
            
            const lower = [];
            for (const point of points) {
                while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], point) <= 0) {
                    lower.pop();
                }
                lower.push(point);
            }
            
            const upper = [];
            for (let i = points.length - 1; i >= 0; i--) {
                const point = points[i];
                while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], point) <= 0) {
                    upper.pop();
                }
                upper.push(point);
            }
            
            return lower.slice(0, -1).concat(upper.slice(0, -1));
        }
        
        function cross(o, a, b) {
            return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
        }
        
        function updateStats() {
            document.getElementById('totalMolecules').textContent = molecules.length;
            document.getElementById('clustersFound').textContent = clusters.length;
            document.getElementById('patternsFound').textContent = patterns.length;
            
            const avgSpeed = molecules.reduce((sum, mol) => sum + Math.sqrt(mol.vx*mol.vx + mol.vy*mol.vy), 0) / molecules.length;
            document.getElementById('avgSpeed').textContent = avgSpeed.toFixed(1);
        }
        
        function animate() {
            if (isPaused) {
                animationId = requestAnimationFrame(animate);
                return;
            }
            
            const temperature = parseInt(document.getElementById('tempSlider').value);
            const density = parseInt(document.getElementById('densitySlider').value);
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update molecules
            molecules.forEach(mol => mol.update(temperature, density));
            
            // Update tracked atoms
            trackedAtoms.forEach(atom => atom.update(temperature));
            
            // Detect clusters and patterns every 30 frames
            if (Date.now() % 30 < 16) {
                detectClusters();
                detectPatterns();
                updateStats();
            }
            
            // Draw everything
            drawClusters();
            drawPatterns();
            molecules.forEach(mol => mol.draw(ctx));
            trackedAtoms.forEach(atom => atom.draw(ctx));
            
            animationId = requestAnimationFrame(animate);
        }
        
        function resetSimulation() {
            const density = parseInt(document.getElementById('densitySlider').value);
            initializeMolecules(density);
            trackedAtoms = [];
        }
        
        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? 'Resume' : 'Pause';
        }
        
        function addTrackedAtom() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            trackedAtoms.push(new TrackedAtom(x, y));
        }
        
        // Event listeners
        document.getElementById('tempSlider').oninput = function() {
            const temp = parseInt(this.value);
            document.getElementById('tempValue').textContent = `${Math.round(temp/2 - 10)}°C`;
        };
        
        document.getElementById('densitySlider').oninput = function() {
            const density = parseInt(this.value);
            document.getElementById('densityValue').textContent = `${density * 10}%`;
            resetSimulation();
        };
        
        canvas.onclick = function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            trackedAtoms.push(new TrackedAtom(x, y));
        };
        
        // Initialize
        initializeMolecules(5);
        animate();
    </script>
</body>
</html>
